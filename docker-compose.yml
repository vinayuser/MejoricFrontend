services:
  front:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_PIXEL_ID: ${VITE_PIXEL_ID}
        VITE_GA_ID: ${VITE_GA_ID}
        VITE_TRIAL_CHAT_DURATION: ${VITE_TRIAL_CHAT_DURATION:-600}
        VITE_FREE_WALLET_RECHARGE: ${VITE_FREE_WALLET_RECHARGE:-100}
        VITE_APP_ENV: ${VITE_APP_ENV:-production}
        VITE_SOCKET_SERVER_URL: ${VITE_SOCKET_SERVER_URL}
        VITE_CHAT_PRICE_PER_MIN: ${VITE_CHAT_PRICE_PER_MIN:-8}
        VITE_AUDIO_CALL_PRICE_PER_MIN: ${VITE_AUDIO_CALL_PRICE_PER_MIN:-12}
        VITE_VIDEO_CALL_PRICE_PER_MIN: ${VITE_VIDEO_CALL_PRICE_PER_MIN:-15}
        VITE_FCM_VAPID_KEY: ${VITE_FCM_VAPID_KEY}
        VITE_BASE: ${VITE_BASE:-/}
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      NODE_ENV: production
    env_file:
      - .env
    restart: unless-stopped
